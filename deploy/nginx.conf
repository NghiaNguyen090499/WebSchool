# -----------------------------------------------------------------------------
# MIS Website - Nginx reverse proxy configuration
# -----------------------------------------------------------------------------
# Copy to: /etc/nginx/sites-available/mis-website
# Then:    ln -s /etc/nginx/sites-available/mis-website /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# -----------------------------------------------------------------------------

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=mis_forms:10m rate=10r/m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name misvn.edu.vn www.misvn.edu.vn;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name misvn.edu.vn www.misvn.edu.vn;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/misvn.edu.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/misvn.edu.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Static files (served by Nginx, not Django)
    location /static/ {
        alias /opt/mis-website/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # Media files (user uploads)
    location /media/ {
        alias /opt/mis-website/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        autoindex off;

        location ~* \.(?:php|py|sh|cgi)$ {
            deny all;
        }
    }

    # Favicon and robots
    location = /favicon.ico {
        alias /opt/mis-website/staticfiles/images/favicon.svg;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        alias /opt/mis-website/staticfiles/robots.txt;
        access_log off;
        log_not_found off;
    }

    # Health endpoints
    location = /healthz/ {
        proxy_pass http://unix:/run/gunicorn/mis-website.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location = /readyz/ {
        proxy_pass http://unix:/run/gunicorn/mis-website.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Form endpoints with an extra Nginx rate-limit layer
    location ~ ^/(en/)?(contact/(consultation|chatbot|chatbot/lead-info)/?|tuyen-sinh/dang-ky/?)$ {
        limit_req zone=mis_forms burst=5 nodelay;
        proxy_pass http://unix:/run/gunicorn/mis-website.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        client_max_body_size 10M;
    }

    # Django application (via Gunicorn)
    location / {
        proxy_pass http://unix:/run/gunicorn/mis-website.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        client_max_body_size 10M;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
    }
}
