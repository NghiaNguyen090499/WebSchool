<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Không có quyền truy cập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        .card {
            max-width: 520px;
            padding: 32px;
            margin: 16px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            text-align: center;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            color: #b91c1c;
        }
        p {
            margin: 8px 0 0;
            line-height: 1.6;
            color: #475569;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #dc2626;
            font-weight: 600;
        }
        .actions {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 0;
        }
        .btn-primary {
            background: #dc2626;
            color: #ffffff;
        }
        .btn-secondary {
            border: 1px solid #e2e8f0;
            color: #334155;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>403</h1>
        <p>Bạn không có quyền truy cập trang này.</p>
        <div class="actions">
            <a href="{{ primary_cta_url }}" class="btn btn-primary">{{ primary_cta_label }}</a>
            <a href="{{ home_url }}" class="btn btn-secondary">Quay về trang chủ</a>
        </div>
    </div>
</body>
</html>
