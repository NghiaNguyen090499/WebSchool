{% comment %}
Assessment Rubric Row — Enhanced
Inputs: icon, criterion, metric, evidence
{% endcomment %}
<article class="curriculum-rubric-row">
    <h3 class="curriculum-h3">
        {% if icon %}<i class="{{ icon }}" aria-hidden="true"></i> {% endif %}{{ criterion }}
    </h3>
    <p class="curriculum-text"><strong>Chỉ báo:</strong> {{ metric }}</p>
    <p class="curriculum-caption"><i class="fas fa-clipboard-check" aria-hidden="true"></i> <strong>Minh chứng:</strong>
        {{ evidence }}</p>
</article>
